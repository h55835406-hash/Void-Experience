<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Experience: The Ritual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #05070a; font-family: 'JetBrains+Mono', monospace; color: white; user-select: none; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input { pointer-events: auto !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        let state = {
            screen: 'menu',
            nickname: localStorage.getItem('hafa_nick') || 'USER',
            mode: 'normal',
            trees: [],
            restoredCount: 0,
            escapeMode: false,
            shadowX: 0,
            escapeTarget: 0
        };

        const playerPos = { x: 500, moving: 0, lastDir: 'right' };
        const assets = {
            ground: new Image(), idle: new Image(),
            left1: new Image(), left2: new Image(),
            right1: new Image(), right2: new Image(),
            t1: new Image(), t2: new Image(), t3: new Image()
        };

        const baseRaw = 'https://raw.githubusercontent.com/h55835406-hash/Void-Experience/main/';
        assets.ground.src = baseRaw + 'Picsart_26-03-01_03-19-11-363.jpg';
        assets.idle.src = baseRaw + 'idle.png';
        assets.left1.src = baseRaw + 'left1.png'; assets.left2.src = baseRaw + 'left2.png';
        assets.right1.src = baseRaw + 'right1.png'; assets.right2.src = baseRaw + 'right2.png';
        assets.t1.src = baseRaw + 'tree1.png'; //
        assets.t2.src = baseRaw + 'tree2.png'; //
        assets.t3.src = baseRaw + 'tree3.png'; //

        function initHorror() {
            state.mode = 'horror';
            state.restoredCount = 0;
            state.escapeMode = false;
            state.trees = Array.from({ length: 10 }, (_, i) => ({
                id: i, x: 600 + (i * 500), stage: 0, progress: 0
            }));
            state.screen = 'game';
            renderUI();
        }

        function renderUI() {
            const root = document.getElementById('root');
            if (state.screen === 'menu') {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-screen px-6">
                        <h1 class="text-4xl font-black mb-10 tracking-tighter">VOID EXP</h1>
                        <div class="flex flex-col gap-4 w-full max-w-[260px]">
                            <button onclick="state.screen='game'; renderUI()" class="py-4 border border-white/10 text-[10px] tracking-[0.3em] font-bold">FREE ROAM</button>
                            <button onclick="initHorror()" class="py-4 bg-red-900/20 border border-red-500/40 text-[10px] tracking-[0.3em] font-bold text-red-200">RESTORE MODE</button>
                        </div>
                    </div>`;
            } else if (state.screen === 'game') {
                root.innerHTML = `
                    <canvas id="gameCanvas"></canvas>
                    <div class="absolute top-6 left-6 text-[9px] tracking-widest opacity-50 uppercase">
                        ${state.escapeMode ? '<span class="text-red-500 animate-pulse">RUN! DON\'T LOOK BACK</span>' : `TREES: ${state.restoredCount}/10`}
                    </div>
                    <div class="absolute bottom-10 left-6 right-6 flex justify-between items-end">
                        <div class="flex gap-4">
                            <button onpointerdown="playerPos.moving=-1; playerPos.lastDir='left'" onpointerup="playerPos.moving=0" class="w-20 h-20 bg-white/5 rounded-3xl border border-white/10 text-2xl">←</button>
                            <button onpointerdown="playerPos.moving=1; playerPos.lastDir='right'" onpointerup="playerPos.moving=0" class="w-20 h-20 bg-white/5 rounded-3xl border border-white/10 text-2xl">→</button>
                        </div>
                        <button id="actBtn" class="hidden w-24 h-24 bg-white text-black rounded-full font-black text-[12px]">FIX</button>
                    </div>`;
                startGame();
            }
        }

        function startGame() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let lastT = 0, frame = 0, anim = 1;

            function loop(t) {
                if(state.screen !== 'game') return;
                const dt = Math.min((t - lastT) / 16.6, 2);
                lastT = t;
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                const gY = canvas.height * 0.72;
                playerPos.x += playerPos.moving * 5 * dt;

                frame++; if(frame > 8) { anim = anim === 1 ? 2 : 1; frame = 0; }
                ctx.fillStyle = state.escapeMode ? '#0a0000' : '#05070a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let near = null;
                state.trees.forEach(tr => {
                    const sx = (canvas.width/2) + (tr.x - playerPos.x);
                    if (sx > -300 && sx < canvas.width + 300) {
                        const img = tr.stage === 0 ? assets.t3 : (tr.stage === 1 ? assets.t2 : assets.t1);
                        ctx.drawImage(img, sx - 100, gY - 180, 200, 200);
                        if (Math.abs(sx - canvas.width/2) < 60 && tr.stage < 2) near = tr;
                    }
                });

                const btn = document.getElementById('actBtn');
                if (btn) {
                    btn.classList.toggle('hidden', !near || state.escapeMode);
                    btn.onpointerdown = () => { if(near) { 
                        near.progress += 3; 
                        if(near.progress >= 100) { near.stage++; near.progress = 0; if(near.stage === 2) state.restoredCount++; }
                    }};
                }

                if (state.restoredCount >= 10 && !state.escapeMode) {
                    state.escapeMode = true;
                    state.escapeTarget = playerPos.x + 3000;
                    state.shadowX = playerPos.x - 1000;
                }

                if (state.escapeMode) {
                    state.shadowX += 4.2 * dt;
                    ctx.fillStyle = 'rgba(255, 0, 0, ' + (Math.sin(t/200)*0.05 + 0.05) + ')';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const shX = (canvas.width/2) + (state.shadowX - playerPos.x);
                    ctx.fillStyle = 'black'; ctx.fillRect(shX - 200, 0, 400, canvas.height);
                    if (state.shadowX >= playerPos.x - 30) { alert("VOID CONSUMED YOU"); location.reload(); return; }
                    if (playerPos.x >= state.escapeTarget) { alert("YOU ESCAPED THE VOID"); location.reload(); return; }
                }

                const pImg = playerPos.moving !== 0 ? assets[playerPos.lastDir + anim] : assets.idle;
                ctx.drawImage(pImg, canvas.width/2 - 45, gY - 80, 90, 90);
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }
        renderUI();
    </script>
</body>
</html>
