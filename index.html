<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #05070a;
            font-family: 'JetBrains+Mono', monospace;
            color: white;
            user-select: none;
            touch-action: none;
        }
        canvas { display: block; image-rendering: pixelated; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Заглушка конфига, если __firebase_config не определен
        let firebaseConfig = { apiKey: "AIza...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch(e) {}

        const appId = "void-experience-v2";
        
        // Инициализация с проверкой
        if (firebaseConfig.projectId !== "...") {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.apps.length ? firebase.firestore() : null;
        const auth = firebase.apps.length ? firebase.auth() : null;

        let state = {
            screen: 'menu',
            user: null,
            nickname: localStorage.getItem('hafa_nick') || 'USER',
            roomId: '',
            players: {},
            messages: [],
            isChatOpen: false,
            chatInput: ''
        };

        const playerPos = { x: Math.random() * 2000, moving: 0, lastDir: 'right' };
        
        const assets = {
            ground: new Image(),
            idle: new Image(),
            left1: new Image(),
            left2: new Image(),
            right1: new Image(),
            right2: new Image()
        };

        const baseRaw = 'https://raw.githubusercontent.com/h55835406-hash/Void-Experience/main/';
        assets.ground.src = baseRaw + 'Picsart_26-03-01_03-19-11-363.jpg';
        assets.idle.src = baseRaw + 'idle.png';
        assets.left1.src = baseRaw + 'left1.png';
        assets.left2.src = baseRaw + 'left2.png';
        assets.right1.src = baseRaw + 'right1.png';
        assets.right2.src = baseRaw + 'right2.png';

        let frameTick = 0;
        let currentFrame = 1;

        if (auth) {
            auth.signInAnonymously().then(cred => {
                state.user = cred.user;
                renderUI();
            }).catch(() => renderUI());
        } else {
            renderUI();
        }

        function setState(newProps) {
            state = { ...state, ...newProps };
            renderUI();
        }

        function setupRoomSync() {
            if (!db || !state.user || !state.roomId) return;
            const roomPath = `artifacts/${appId}/public/data/rooms/${state.roomId.toUpperCase()}`;
            
            db.collection(`${roomPath}/players`).onSnapshot(snap => {
                const ps = {};
                snap.forEach(d => { if(d.id !== state.user.uid) ps[d.id] = d.data(); });
                state.players = ps;
            }, err => console.log("FireStore error: ", err));

            db.collection(`${roomPath}/messages`).orderBy('t', 'desc').limit(20).onSnapshot(snap => {
                let msgs = [];
                snap.forEach(d => msgs.push(d.data()));
                state.messages = msgs.reverse();
                updateChatUI();
            }, err => console.log("Chat error: ", err));

            setInterval(() => {
                if(state.screen === 'game' && state.user) {
                    db.doc(`${roomPath}/players/${state.user.uid}`).set({
                        x: playerPos.x,
                        dir: playerPos.lastDir,
                        moving: playerPos.moving,
                        nick: state.nickname,
                        t: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
            }, 600);
        }

        async function sendMsg() {
            if (!db || !state.chatInput.trim() || !state.roomId) return;
            const roomPath = `artifacts/${appId}/public/data/rooms/${state.roomId.toUpperCase()}`;
            await db.collection(`${roomPath}/messages`).add({
                text: state.chatInput,
                nick: state.nickname,
                t: firebase.firestore.FieldValue.serverTimestamp()
            });
            state.chatInput = '';
            const inp = document.getElementById('chatInp');
            if (inp) inp.value = '';
        }

        function renderUI() {
            const root = document.getElementById('root');
            if (state.screen === 'menu') {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-screen fade-in px-6">
                        <div class="mb-12 text-center">
                            <p class="text-[8px] tracking-[0.6em] text-gray-500 mb-2 uppercase opacity-60">Hafa Studio Presents</p>
                            <h1 class="text-3xl md:text-5xl font-black tracking-tighter uppercase leading-none">Void Experience</h1>
                        </div>
                        <div class="flex flex-col gap-3 w-full max-w-[280px]">
                            <button onclick="startNew()" class="w-full py-5 bg-white/5 border border-white/10 text-[10px] tracking-[0.4em] font-bold hover:bg-white hover:text-black transition-all active:scale-95">CREATE VOID</button>
                            <button onclick="setState({screen:'lobby'})" class="w-full py-5 bg-white/5 border border-white/10 text-[10px] tracking-[0.4em] font-bold hover:bg-white hover:text-black transition-all active:scale-95">JOIN VOID</button>
                            <button onclick="setState({screen:'settings'})" class="mt-4 text-[9px] text-gray-500 hover:text-white uppercase tracking-widest text-center transition-colors">Identity: ${state.nickname}</button>
                        </div>
                    </div>
                `;
            } else if (state.screen === 'lobby') {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-screen p-6">
                        <input id="roomInp" type="text" maxlength="5" class="bg-transparent border-b border-white/20 py-4 text-center text-4xl outline-none tracking-[0.5em] w-full max-w-[300px] uppercase" placeholder="CODE">
                        <div class="mt-10 flex flex-col gap-4 w-full max-w-[200px]">
                            <button onclick="joinRoom()" class="py-3 bg-white text-black text-[10px] font-bold uppercase tracking-widest">Enter</button>
                            <button onclick="setState({screen:'menu'})" class="text-[10px] opacity-30 uppercase tracking-widest py-2">Back</button>
                        </div>
                    </div>
                `;
                setTimeout(() => document.getElementById('roomInp')?.focus(), 100);
            } else if (state.screen === 'settings') {
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-screen p-6">
                        <p class="text-[8px] tracking-widest text-gray-500 mb-4 uppercase">Set Nickname</p>
                        <input id="nickInp" type="text" maxlength="10" value="${state.nickname}" class="bg-transparent border-b border-white/20 py-2 text-center text-3xl outline-none uppercase w-full max-w-[300px]" placeholder="NAME">
                        <button onclick="saveNick()" class="mt-12 px-12 py-4 bg-white/5 border border-white/10 text-[10px] uppercase tracking-[0.3em] font-bold hover:bg-white hover:text-black">Save</button>
                    </div>
                `;
            } else if (state.screen === 'game') {
                root.innerHTML = `
                    <canvas id="gameCanvas"></canvas>
                    <div class="absolute top-6 left-6 text-[8px] tracking-widest opacity-40 uppercase pointer-events-none">
                        ${state.nickname} // ${state.roomId || 'OFFLINE'}
                    </div>
                    
                    <button onclick="toggleChat()" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-white/5 border border-white/10 rounded-full z-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    </button>

                    <div id="chatBox" class="absolute top-0 right-0 h-full w-full sm:w-72 bg-black/90 backdrop-blur-xl border-l border-white/5 transition-transform duration-500 z-40 p-6 flex flex-col ${state.isChatOpen ? 'translate-x-0' : 'translate-x-full'}">
                        <div class="flex-1 overflow-y-auto space-y-4 pt-16 no-scrollbar" id="chatMsgs"></div>
                        <div class="mt-4 flex gap-2">
                             <input id="chatInp" onkeydown="if(event.key==='Enter') sendMsg()" class="flex-1 bg-white/5 p-3 rounded text-xs outline-none border border-white/5" placeholder="Say something...">
                             <button onclick="sendMsg()" class="bg-white/10 px-3 rounded text-[10px]">OK</button>
                        </div>
                    </div>

                    <div class="absolute bottom-10 left-6 right-6 flex justify-between items-end pointer-events-none">
                        <div class="flex gap-4 pointer-events-auto">
                            <button onpointerdown="setMove(-1)" onpointerup="setMove(0)" onpointerleave="setMove(0)" class="w-16 h-16 bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center text-xl backdrop-blur-sm active:bg-white/20 select-none">←</button>
                            <button onpointerdown="setMove(1)" onpointerup="setMove(0)" onpointerleave="setMove(0)" class="w-16 h-16 bg-white/5 rounded-2xl border border-white/10 flex items-center justify-center text-xl backdrop-blur-sm active:bg-white/20 select-none">→</button>
                        </div>
                        <button onclick="location.reload()" class="text-[8px] opacity-20 hover:opacity-100 uppercase tracking-widest font-bold pointer-events-auto p-2">Leave</button>
                    </div>
                `;
                initGame();
                updateChatUI();
            }
        }

        function setMove(dir) {
            playerPos.moving = dir;
            if (dir !== 0) playerPos.lastDir = dir > 0 ? 'right' : 'left';
        }

        function startNew() {
            state.roomId = Math.random().toString(36).substring(7).toUpperCase();
            state.screen = 'game';
            setupRoomSync();
            renderUI();
        }

        function joinRoom() {
            const val = document.getElementById('roomInp').value;
            if(val.length >= 3) {
                state.roomId = val.toUpperCase();
                state.screen = 'game';
                setupRoomSync();
                renderUI();
            }
        }

        function saveNick() {
            const val = document.getElementById('nickInp').value;
            state.nickname = val.toUpperCase().trim() || 'USER';
            localStorage.setItem('hafa_nick', state.nickname);
            state.screen = 'menu';
            renderUI();
        }

        function toggleChat() {
            state.isChatOpen = !state.isChatOpen;
            const cb = document.getElementById('chatBox');
            if(cb) cb.style.transform = state.isChatOpen ? 'translateX(0)' : 'translateX(100%)';
        }

        function updateChatUI() {
            const container = document.getElementById('chatMsgs');
            if(!container) return;
            container.innerHTML = state.messages.map(m => `
                <div class="fade-in bg-white/5 p-2 rounded">
                    <span class="text-[7px] text-gray-500 font-bold block mb-1 uppercase tracking-tight">${m.nick || 'Stranger'}</span>
                    <span class="text-[11px] leading-tight opacity-90">${m.text}</span>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function initGame() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let aniId;
            
            function loop() {
                if(state.screen !== 'game') return;
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const groundY = canvas.height * 0.72;

                playerPos.x += playerPos.moving * 3.5;

                frameTick++;
                if(frameTick > 10) {
                    currentFrame = currentFrame === 1 ? 2 : 1;
                    frameTick = 0;
                }

                ctx.fillStyle = '#05070a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (assets.ground.complete) {
                    const tw = 600;
                    const offset = (playerPos.x % tw);
                    for (let i = -tw; i < canvas.width + tw; i += tw) {
                        ctx.drawImage(assets.ground, i - offset, groundY, tw, canvas.height - groundY);
                    }
                } else {
                    ctx.fillStyle = "#0a0a0a";
                    ctx.fillRect(0, groundY, canvas.width, canvas.height);
                }

                function drawSprite(x, nick, isMe, moving, dir) {
                    const screenX = isMe ? canvas.width / 2 : (canvas.width / 2) + (x - playerPos.x);
                    const size = 80; // Размер спрайта
                    const vY = groundY + 12;

                    let img = assets.idle;
                    if (moving !== 0) {
                        const side = dir === 'left' ? 'left' : 'right';
                        img = assets[side + currentFrame];
                    }

                    if (img.complete && img.naturalWidth !== 0) {
                        ctx.drawImage(img, screenX - size/2, vY - size, size, size);
                    } else {
                        // Фолбек если картинки нет
                        ctx.fillStyle = isMe ? "white" : "gray";
                        ctx.fillRect(screenX - 10, vY - 40, 20, 40);
                    }

                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.font = '8px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(nick.toUpperCase(), screenX, vY - size - 8);
                }

                Object.values(state.players).forEach(p => drawSprite(p.x, p.nick, false, p.moving, p.dir));
                drawSprite(playerPos.x, state.nickname, true, playerPos.moving, playerPos.lastDir);

                aniId = requestAnimationFrame(loop);
            }
            loop();
        }

        window.addEventListener('resize', () => { if(state.screen === 'game') renderUI(); });
        renderUI();
    </script>
</body>
</html>
